<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>AR Experience</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; font-family: sans-serif; }

      #ar-canvas {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
      }

      /* Tap-to-start overlay */
      #tap-to-start {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.75);
        color: white;
        z-index: 100;
        cursor: pointer;
      }
      #tap-to-start h1 { font-size: 1.5rem; margin-bottom: 1rem; }
      #tap-to-start p  { font-size: 1rem; opacity: 0.7; }

      /* Narrative prompt shown during experience */
      #prompt {
        position: fixed;
        bottom: 10%;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.6);
        color: white;
        padding: 0.75rem 1.5rem;
        border-radius: 2rem;
        font-size: 1rem;
        text-align: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.5s ease;
        z-index: 50;
        max-width: 80vw;
      }
      #prompt.visible { opacity: 1; }
    </style>
  </head>
  <body>
    <!-- 8th Wall engine binary — must load before src/main.js -->
    <script src="/xrengine/xr.js"></script>

    <canvas id="ar-canvas"></canvas>

    <div id="tap-to-start">
      <h1>✦ AR Experience</h1>
      <p>Tap anywhere to begin</p>
    </div>

    <div id="prompt"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
